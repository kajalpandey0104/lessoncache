name: Artifacts

on:
  push:

jobs:

  upload-artifact:
    name: Job to upload an artifact
    runs-on: ubuntu-latest

    steps:
      - name: Generate file
        run: |
          docker info > myArtifact.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4

        with:
          name: my-artifact
          path: myArtifact.txt


  download-artifact:
    name: Job to download and test artifact
    runs-on: ubuntu-latest

    needs: upload-artifact

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4

        with:
          name: my-artifact

      - name: List files
        run: ls

      - name: Print file content
        run: cat myArtifact.txt
